<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>stravish</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="i18n.js"></script>
<style>
:root {
  --bg:#0f1117; --surface:#1a1d27; --surface2:#222536;
  --border:#2e3148; --text:#e8eaf6; --text2:#8b90b0;
  --orange:#fc4c02; --green:#4caf50; --blue:#5b8dee;
  --gold:#ffd700; --silver:#c0c0c0; --bronze:#cd7f32;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:13px;display:flex;flex-direction:column;height:100vh;overflow:hidden}

/* TOP BAR */
#topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:8px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.logo{font-size:18px;font-weight:700;color:var(--orange);letter-spacing:-.5px}
#db-status{font-size:11px;color:var(--text2)}
.spacer{flex:1}
.btn{background:var(--orange);color:white;border:none;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;transition:opacity .15s}
.btn:hover{opacity:.85}
.btn.sec{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.btn.sec:hover{background:var(--border)}

/* MAIN */
#main{display:flex;flex:1;overflow:hidden}

/* LEFT — activity list */
#left{width:280px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
#left-header{padding:10px 14px 6px;border-bottom:1px solid var(--border);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--text2)}
#act-list{flex:1;overflow-y:auto}

.act-item{padding:10px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}
.act-item:hover,.act-item.active{background:var(--surface2)}
.act-item.active{border-left:3px solid var(--orange)}
.act-name{font-weight:600;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.act-meta{font-size:11px;color:var(--text2);margin-top:3px}
.act-seg-count{display:inline-block;font-size:10px;font-weight:700;padding:1px 6px;border-radius:8px}
.act-seg-count.strava-count{background:rgba(252,76,2,.18);color:var(--orange)}
.act-seg-count.auto-count{background:rgba(64,180,224,.18);color:#40b4e0}
.act-seg-count.no-seg{background:rgba(255,255,255,.06);color:var(--text2)}
.act-seg-count.hist-count{background:rgba(252,140,66,.18);color:#ff8c42}
.act-notes-area{width:100%;margin-top:6px;background:var(--bg);border:1px solid var(--border);border-radius:5px;color:var(--text);font-size:11px;padding:5px 7px;resize:vertical;min-height:40px;font-family:inherit;line-height:1.4;transition:border-color .15s}
.act-notes-area:focus{outline:none;border-color:var(--orange)}
.act-notes-area::placeholder{color:var(--text2)}
.notes-saved{font-size:10px;color:var(--text2);text-align:right;height:12px;margin-top:2px}

/* CENTER — map + segment list below */
#center{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative}
#map-wrap{flex:1;position:relative;min-height:0}
#map{width:100%;height:100%}
#map-controls{position:absolute;top:10px;right:10px;z-index:500;display:flex;gap:6px}
.map-toggle{background:var(--surface);border:1px solid var(--border);color:var(--text2);padding:5px 10px;border-radius:6px;cursor:pointer;font-size:11px;font-weight:600;transition:all .15s;user-select:none}
.map-toggle:hover{background:var(--surface2);color:var(--text)}
.map-toggle.active{background:var(--orange);color:white;border-color:var(--orange)}

  /* STRAVA EFFORT FETCH */
  .strava-fetch-bar{display:flex;gap:5px;margin-top:6px;align-items:center}
  .strava-id-input{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:5px;color:var(--text);font-size:11px;padding:4px 7px;font-family:inherit;-moz-appearance:textfield}
  .strava-id-input::-webkit-outer-spin-button,.strava-id-input::-webkit-inner-spin-button{-webkit-appearance:none}
  .strava-id-input:focus{outline:none;border-color:var(--orange)}
  .strava-id-input::placeholder{color:var(--text2)}
  .fetch-btn{background:var(--orange);color:white;border:none;padding:4px 10px;border-radius:5px;cursor:pointer;font-size:11px;font-weight:600;white-space:nowrap;transition:opacity .15s}
  .fetch-btn:hover{opacity:.85}
  .fetch-btn:disabled{opacity:.4;cursor:default}
  .fetch-status{font-size:10px;margin-top:2px;min-height:12px}

  /* TREEVIEW segmenti dentro act-item */
.act-tree{display:none;margin-top:6px;border-top:1px solid var(--border);padding-top:6px}
.act-tree.open{display:block}
.tree-seg{display:flex;align-items:flex-start;gap:6px;padding:5px 4px;border-radius:5px;cursor:pointer;transition:background .1s;position:relative}
.tree-seg:hover{background:var(--bg)}
.tree-seg.active{background:var(--bg);outline:1px solid var(--orange)}
.tree-seg-num{font-size:10px;color:var(--text2);width:16px;flex-shrink:0;text-align:right;margin-top:1px}
.tree-seg-body{flex:1;min-width:0}
.tree-seg-name{font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tree-seg-meta{font-size:10px;color:var(--text2);margin-top:1px}
.tree-seg-time{font-size:11px;font-weight:700;color:var(--orange);white-space:nowrap;flex-shrink:0}
.effort-delete{opacity:0;font-size:12px;margin-left:4px;display:flex;align-items:center;transition:all .15s}
.tree-seg:hover .effort-delete{opacity:.6}
.tree-seg .effort-delete:hover{opacity:1;color:var(--orange)}
  #sync-log{background:var(--surface);border-bottom:1px solid var(--border);padding:6px 12px;font-size:11px;display:flex;flex-direction:column;gap:3px;max-height:120px;overflow-y:auto}
  .sync-log-row{display:flex;align-items:center;gap:6px;color:var(--text2)}
  .sync-log-row .sync-spinner{animation:spin .8s linear infinite;display:inline-block}
  @keyframes spin{to{transform:rotate(360deg)}}
  .sync-log-row.done{color:var(--green)}
  .sync-log-row.error{color:var(--orange)}
  .act-delete{margin-left:6px;opacity:0;cursor:pointer;font-size:11px;transition:opacity .15s;user-select:none}
  .act-refresh{margin-left:6px;opacity:0;cursor:pointer;font-size:11px;transition:opacity .15s;user-select:none}
  .act-edit{margin-left:6px;opacity:0;cursor:pointer;font-size:11px;transition:opacity .15s;user-select:none}
  .act-item:hover .act-delete{opacity:.5}
  .act-item:hover .act-refresh{opacity:.5}
  .act-item:hover .act-edit{opacity:.5}
  .act-item:hover .act-delete:hover{opacity:1}
  .act-item:hover .act-refresh:hover{opacity:1}
  .act-item:hover .act-edit:hover{opacity:1}
  .tree-seg-vam{font-size:10px;font-weight:600;color:var(--orange);background:rgba(252,76,2,.12);border-radius:3px;padding:1px 4px;margin-left:5px}
  #settings-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:2000;align-items:center;justify-content:center}
  #settings-modal.open{display:flex}
  #settings-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;width:420px;max-width:95vw;max-height:90vh;display:flex;flex-direction:column;overflow:hidden}
  #settings-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
  #settings-header h3{flex:1;font-size:15px;font-weight:700}
  #settings-body{padding:16px 18px;display:flex;flex-direction:column;gap:12px;overflow-y:auto}
  .settings-section{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--text2);margin-top:4px}
  .settings-row{display:flex;align-items:center;justify-content:space-between;gap:12px}
  .settings-row label{font-size:12px;color:var(--text);flex:1}
  .settings-row input,.settings-row select{width:200px;background:var(--bg);border:1px solid var(--border);border-radius:5px;color:var(--text);font-size:12px;padding:5px 8px}
  #settings-footer{padding:12px 18px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:flex-end;gap:10px}
  .act-summary-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);border-top:1px solid var(--border);border-bottom:1px solid var(--border);margin:8px 0}
  .summary-cell .value.empty{color:var(--text2);font-weight:400;font-size:13px}
  .summary-cell{background:var(--surface);padding:10px 12px}
  .summary-cell .label{font-size:10px;color:var(--text2);margin-bottom:2px}
  .summary-cell .value{font-size:14px;font-weight:700;color:var(--text)}
  .summary-cell .sub{font-size:10px;color:var(--text2);margin-top:2px}
  .act-summary-compounds{display:flex;gap:1px;background:var(--border);border-bottom:1px solid var(--border)}
  .summary-compound{flex:1;background:var(--surface);padding:10px 12px}
  .compound-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text2);margin-bottom:6px}
  .compound-row{display:flex;justify-content:space-between;align-items:baseline;margin-top:3px}
  .compound-label{font-size:10px;color:var(--text2);min-width:32px}
  .compound-value{font-size:13px;font-weight:700;color:var(--text)}
  .compound-value.empty{font-weight:400;color:var(--text2)}
.act-expand{float:right;font-size:11px;color:var(--text2);cursor:pointer;padding:0 4px;user-select:none;transition:transform .15s}
.act-expand.open{transform:rotate(90deg)}

/* RIGHT — segment history */
#right{width:0;flex-shrink:0;background:var(--surface);display:flex;flex-direction:column;overflow:hidden;transition:width .25s ease}
#right.open{width:400px;border-left:1px solid var(--border)}
#right-header{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:8px}
#right-seg-name{font-size:14px;font-weight:700;flex:1;line-height:1.3}
.close-btn{cursor:pointer;color:var(--text2);font-size:18px;line-height:1;flex-shrink:0}
.close-btn:hover{color:var(--text)}
#right-body{flex:1;overflow-y:auto}

.seg-stats-bar{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);border-bottom:1px solid var(--border)}
.stat-cell{background:var(--surface2);padding:10px 12px}
.stat-cell .label{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px}
.stat-cell .value{font-size:15px;font-weight:700;margin-top:2px}
.chart-section{padding:14px;border-bottom:1px solid var(--border)}
.section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text2);margin-bottom:8px}
.chart-container{position:relative;height:130px}
.efforts-section{padding:14px}
.efforts-table{width:100%;border-collapse:collapse}
.efforts-table th{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--text2);padding:4px 6px;text-align:left;border-bottom:1px solid var(--border)}
  .medals-section{padding:10px 14px 14px}
  .medal-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border)}
  .medal-row:last-child{border-bottom:none}
  .medal-icon{font-size:18px;flex-shrink:0;width:24px;text-align:center}
  .medal-name{flex:1;font-size:12px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer}
  .medal-name:hover{color:var(--orange)}
  .medal-time{font-size:12px;font-weight:700;color:var(--text);white-space:nowrap}
  .medal-total{font-size:10px;color:var(--text2);white-space:nowrap}
  /* Power bests section */
  .power-bests-section{padding:10px 14px 14px}
  .power-bests-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px}
  .power-best-item{background:var(--surface2);border-radius:6px;padding:8px 10px;display:flex;flex-direction:column;gap:2px}
  .power-best-interval{font-size:10px;color:var(--text2);font-weight:600}
  .power-best-value{font-size:16px;font-weight:700;color:var(--orange)}
  .power-best-range{font-size:9px;color:var(--text2)}
  .power-best-rank{font-size:9px;color:var(--text2);font-weight:600}
  .power-best-item.power-best-pr{background:linear-gradient(135deg,rgba(255,215,0,.15),rgba(252,76,2,.12));border:1px solid rgba(255,215,0,.3)}
  .power-best-item.power-best-pr .power-best-value{color:var(--gold)}
  .cur-act-row{background:rgba(252,76,2,.12)!important}
  .cur-act-row td{border-top:1px solid rgba(252,76,2,.25)!important;border-bottom:1px solid rgba(252,76,2,.25)!important}
.efforts-table td{padding:7px 6px;border-bottom:1px solid var(--border);vertical-align:middle}
.efforts-table tr:hover td{background:var(--surface2)}
.rank-badge{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;font-size:11px;font-weight:700}
.rank-1{background:var(--gold);color:#000}
.rank-2{background:var(--silver);color:#000}
.rank-3{background:var(--bronze);color:#fff}
.rank-n{background:var(--surface2);color:var(--text2)}
.delta-best{font-size:11px;color:var(--text2)}
.delta-best.is-best{color:var(--green);font-weight:600}

/* DROP OVERLAY */
#import-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(15,17,23,.85);z-index:1000;flex-direction:column;gap:12px}
#drop-zone{border:2px dashed var(--border);border-radius:16px;padding:40px 56px;text-align:center;color:var(--text2);transition:all .2s;cursor:pointer}
#drop-zone.drag-over{border-color:var(--orange);color:var(--text);background:rgba(252,76,2,.05)}
#drop-zone .icon{font-size:36px;margin-bottom:8px}
#import-progress{display:none;text-align:center;color:var(--text2)}
.spinner{font-size:24px;animation:spin 1s linear infinite;display:block;margin-bottom:8px}
@keyframes spin{to{transform:rotate(360deg)}}

/* GLOBAL LOADING OVERLAY */
#global-loading{display:none;position:fixed;inset:0;background:rgba(15,17,23,.92);z-index:3000;align-items:center;justify-content:center;flex-direction:column;gap:12px}
#global-loading.active{display:flex}
#global-loading .spinner{font-size:32px;color:var(--orange)}
#global-loading .loading-text{font-size:14px;color:var(--text);font-weight:600}
#global-loading .loading-sub{font-size:12px;color:var(--text2)}
#global-loading .loading-countdown{font-size:11px;color:var(--text2);margin-top:2px;min-height:14px}
#loading-cancel{margin-top:8px;background:var(--surface2);color:var(--text);border:1px solid var(--border);padding:6px 18px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;transition:all .15s}
#loading-cancel:hover{background:var(--border);color:var(--orange)}

/* STRAVA SYNC MODAL */
#sync-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:2000;align-items:center;justify-content:center}
#sync-modal.open{display:flex}
#sync-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;width:560px;max-width:95vw;max-height:80vh;display:flex;flex-direction:column;overflow:hidden}
#sync-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
#sync-header h3{flex:1;font-size:15px;font-weight:700}
#sync-body{flex:1;overflow-y:auto}
#sync-footer{padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;align-items:center}
#sync-footer .sync-count{flex:1;font-size:11px;color:var(--text2)}
.strava-act-row{display:flex;align-items:center;gap:10px;padding:9px 16px;border-bottom:1px solid var(--border);transition:background .1s}
.strava-act-row:hover{background:var(--surface2)}
.strava-act-row.imported{opacity:.45}
.strava-act-row input[type=checkbox]{accent-color:var(--orange);width:15px;height:15px;flex-shrink:0;cursor:pointer}
.strava-act-row.imported input[type=checkbox]{cursor:default}
.strava-act-info{flex:1;min-width:0}
.strava-act-name{font-weight:600;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.strava-act-meta{font-size:10px;color:var(--text2);margin-top:2px}
.imported-badge{font-size:10px;color:var(--green);flex-shrink:0}
.strava-link{font-size:10px;color:var(--blue);text-decoration:none;flex-shrink:0}
.strava-link:hover{text-decoration:underline}
#sync-status{font-size:11px;color:var(--text2);padding:24px;text-align:center}

/* SETTINGS BTN + AUTH DOT */
.settings-btn{display:inline-flex;align-items:center;gap:5px}
.auth-dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0;transition:background .2s}
.auth-dot.dot-ok{background:var(--green)}
.auth-dot.dot-warn{background:#ffc107}
.auth-dot.dot-err{background:var(--orange)}
.auth-dot.dot-none{background:var(--text2)}
.strava-auth-section{border:1px solid var(--border);border-radius:8px;padding:12px;margin-top:4px;background:var(--bg)}
.strava-auth-status{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.strava-auth-status .status-text{font-size:12px;font-weight:600}
.strava-auth-status .status-detail{font-size:10px;color:var(--text2)}
.strava-auth-actions{display:flex;gap:6px;align-items:center;margin-top:8px}
.strava-auth-msg{font-size:10px;min-height:14px;margin-top:4px}
.strava-auth-hint{font-size:10px;color:var(--text2);margin-top:6px}
.strava-auth-hint code{background:var(--surface2);padding:1px 5px;border-radius:3px;font-size:10px}

/* AI ANALYSIS BUTTON */
.ai-btn{background:linear-gradient(135deg,#6c5ce7,#a29bfe);color:white;border:none;padding:3px 10px;border-radius:5px;cursor:pointer;font-size:10px;font-weight:700;letter-spacing:.3px;transition:all .15s;flex-shrink:0}
.ai-btn:hover{opacity:.85;transform:scale(1.03)}
.ai-btn:disabled{opacity:.4;cursor:default;transform:none}
.ai-btn.loading{animation:ai-pulse 1.2s ease-in-out infinite}
@keyframes ai-pulse{0%,100%{opacity:.6}50%{opacity:1}}
.ai-status{font-size:10px;min-height:12px;margin-top:2px}

::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>
<body>

<div id="topbar">
  <span class="logo">stravish</span>
  <span id="db-status" data-i18n="app.connecting"></span>
  <div class="spacer"></div>
  <button class="btn sec" id="btn-sync-strava" data-i18n="btn.syncStrava"></button>
  <button class="btn sec" id="btn-import" data-i18n="btn.import"></button>
  <button class="btn sec settings-btn" id="btn-settings">⚙ <span id="strava-auth-dot" class="auth-dot"></span></button>
</div>

<div id="main">

  <!-- LEFT: activity list -->
  <div id="left">
    <div id="left-header" data-i18n="left.activities"></div>
    <div id="sync-log" style="display:none"></div>
    <div id="act-list"><div style="padding:24px;text-align:center;color:var(--text2)" data-i18n="left.loading"></div></div>
  </div>

  <!-- CENTER: map + segment strip -->
  <div id="center">
    <div id="map-wrap">
      <div id="map"></div>
      <div id="map-controls">
        <div class="map-toggle active" id="toggle-pan" data-i18n="map.pan"></div>
        <div class="map-toggle" id="toggle-fit" data-i18n="map.fit"></div>
      </div>
      <div id="import-overlay">
        <div id="drop-zone">
          <div class="icon">🗺️</div>
          <p data-i18n-html="import.dropTitle"></p>
          <small data-i18n="import.dropSubtitle"></small>
        </div>
        <div id="import-progress">
          <span class="spinner">⟳</span>
          <span id="import-msg" data-i18n="import.inProgress"></span>
        </div>
        <input type="file" id="file-input" accept=".gpx" multiple style="display:none">
      </div>
    </div>

  </div>

  <!-- RIGHT: segment history -->
  <div id="right">
    <div id="right-header">
      <div id="right-seg-name">—</div>
      <div class="close-btn" id="right-close">✕</div>
    </div>
    <div id="right-body"></div>
  </div>

</div>

<div id="settings-modal">
  <div id="settings-box">
    <div id="settings-header">
      <h3 data-i18n="settings.title"></h3>
      <div class="close-btn" id="settings-close">✕</div>
    </div>
    <div id="settings-body">
      <div class="settings-section" data-i18n="settings.language"></div>
      <div class="settings-row">
        <label data-i18n="settings.language"></label>
        <select id="cfg-lang"></select>
      </div>
      <div class="settings-section" data-i18n="settings.cyclistProfile"></div>
      <div class="settings-row">
        <label data-i18n="settings.riderWeight"></label>
        <input type="number" id="cfg-weight" min="40" max="150" step="0.5" placeholder="75">
      </div>
      <div class="settings-row">
        <label data-i18n="settings.bikeWeight"></label>
        <input type="number" id="cfg-bike" min="5" max="30" step="0.5" placeholder="10">
      </div>
      <div class="settings-section" data-i18n="settings.resistance"></div>

          <option value="0.45" data-i18n="settings.posUpright"></option>
          <option value="0.36" data-i18n="settings.posHoods"></option>

          <option value="0.22" data-i18n="settings.posTT"></option>

      <div class="settings-row">
        <label data-i18n="settings.overlayTimeout"></label>
        <input type="number" id="cfg-overlay-timeout" min="0" max="600" step="10" placeholder="120">

      <div class="settings-section" data-i18n="settings.aiAnalysis"></div>
      <div id="ai-provider-config"></div>
      <div class="settings-section" data-i18n="settings.stravaApi"></div>
      <div class="strava-auth-section">
        <div class="strava-auth-status">
          <span id="strava-status-text" class="status-text"></span>
          <span id="strava-status-detail" class="status-detail"></span>
        </div>
        <div class="settings-row">
          <label data-i18n="settings.stravaClientId"></label>
          <input type="text" id="cfg-strava-client-id" placeholder="123456">

          <label data-i18n="settings.stravaClientSecret"></label>
          <input type="password" id="cfg-strava-client-secret" placeholder="••••••••••">
        </div>
        <div class="strava-auth-actions">
          <button class="btn sec" id="strava-save-creds" style="font-size:11px;padding:4px 12px" data-i18n="btn.save"></button>
          <button class="btn sec" id="strava-refresh-token" style="font-size:11px;padding:4px 12px" data-i18n="strava.refreshToken"></button>
          <span id="strava-auth-msg" class="strava-auth-msg"></span>
        </div>
        <div id="strava-login-hint" class="strava-auth-hint" style="display:none" data-i18n-html="strava.loginHint"></div>
      </div>
    </div>
    <div id="settings-footer">
      <span id="settings-saved" style="font-size:11px;color:var(--green)"></span>
      <button class="btn" id="settings-save" data-i18n="btn.save"></button>
    </div>
  </div>
</div>

<div id="global-loading">
  <span class="spinner">⟳</span>
  <span class="loading-text" data-i18n="import.inProgress"></span>
  <span class="loading-sub" id="loading-detail"></span>
  <span class="loading-countdown" id="loading-countdown"></span>
  <button id="loading-cancel" data-i18n="overlay.cancel"></button>
</div>

<div id="sync-modal">
  <div id="sync-box">
    <div id="sync-header">
      <span style="font-size:20px">⚡</span>
      <h3 data-i18n="sync.title"></h3>
      <button class="btn sec" id="sync-select-all" style="font-size:11px;padding:4px 10px" data-i18n="btn.selectNew"></button>
      <div class="close-btn" id="sync-close">✕</div>
    </div>
    <div id="sync-body"><div id="sync-status" data-i18n="left.loading"></div></div>
    <div id="sync-footer">
      <span class="sync-count" id="sync-count"></span>
      <button class="btn sec" id="sync-cancel" data-i18n="btn.close"></button>
      <button class="btn sec" id="sync-open-strava" style="display:none" data-i18n="btn.openStrava"></button>
      <button class="btn" id="sync-import-selected" style="display:none" data-i18n="btn.importFromStrava"></button>
    </div>
  </div>
</div>

<script>
const API = '';
let map, panMode = true;
let allActivities = [], currentActivityId = null, currentEfforts = [];
let activeSegmentId = null, activeEffortId = null, speedChart = null;
let mapLayers = [];
let currentTrack = null, currentStreamLength = null;

// ── I18N HELPERS ──────────────────────────────────────────────────
function applyI18n() {
  // Apply text content
  document.querySelectorAll('[data-i18n]').forEach(el => {
    el.textContent = t(el.dataset.i18n);
  });
  // Apply HTML content
  document.querySelectorAll('[data-i18n-html]').forEach(el => {
    el.innerHTML = t(el.dataset.i18nHtml);
  });
  // Apply placeholders
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
    el.placeholder = t(el.dataset.i18nPlaceholder);
  });
  // Apply titles
  document.querySelectorAll('[data-i18n-title]').forEach(el => {
    el.title = t(el.dataset.i18nTitle);
  });
  // Update HTML lang attribute
  document.documentElement.lang = I18N.getLang();
}

function initLanguageSelector() {
  const sel = document.getElementById('cfg-lang');
  if (!sel) return;
  sel.innerHTML = Object.entries(I18N.languages)
    .map(([code, name]) => `<option value="${code}" ${code === I18N.getLang() ? 'selected' : ''}>${name}</option>`)
    .join('');
  sel.addEventListener('change', () => {
    I18N.setLang(sel.value);
    applyI18n();
    loadStatus(); // Ricarica lo status con la lingua aggiornata
    renderActivities();
    if (currentActivityId) showActivitySummary(currentActivityId);
  });
}

// ── MAP ───────────────────────────────────────────────────────────
map = L.map('map', {zoomControl:true}).setView([44, 12.5], 10);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution:'© OpenStreetMap © CARTO', maxZoom:19
}).addTo(map);

document.getElementById('toggle-pan').addEventListener('click', () => {
  panMode = true;
  document.getElementById('toggle-pan').classList.add('active');
  document.getElementById('toggle-fit').classList.remove('active');
});
document.getElementById('toggle-fit').addEventListener('click', () => {
  panMode = false;
  document.getElementById('toggle-pan').classList.remove('active');
  document.getElementById('toggle-fit').classList.add('active');
});

function clearMapLayers() {
  mapLayers.forEach(l => map.removeLayer(l));
  mapLayers = [];
}
function mapFocusLayer(layer) {
  if (panMode) map.panTo(layer.getBounds().getCenter());
  else map.fitBounds(layer.getBounds(), {padding:[40,40]});
}

// ── API ───────────────────────────────────────────────────────────
async function api(path, options) {
  const r = await fetch(API + path, options);
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

// ── STATUS ────────────────────────────────────────────────────────
async function loadStatus() {
  try {
    const s = await api('/api/status');
    document.getElementById('db-status').textContent =
      t('app.status', {activities: s.activities, segments: s.segments, efforts: s.efforts});
    if (s.activities > 0 || s.efforts > 0) hideImportOverlay();
  } catch(e) {
    document.getElementById('db-status').textContent = t('app.serverUnreachable');
  }
}
function hideImportOverlay() {
  document.getElementById('import-overlay').style.display = 'none';
}

// ── ACTIVITIES ────────────────────────────────────────────────────
async function loadActivities() {
  allActivities = await api('/api/activities');
  renderActivities();
}

// ── SYNC LOG
const _syncActive = new Map(); // activityId → {name, startTime}

function syncLogUpdate() {
  const el = document.getElementById('sync-log');
  if (_syncActive.size === 0) { el.style.display = 'none'; return; }
  el.style.display = 'flex';
  el.innerHTML = [..._syncActive.entries()].map(([id, s]) => {
    const elapsed = Math.round((Date.now() - s.startTime) / 1000);
    return `<div class="sync-log-row"><span class="sync-spinner">⟳</span><span>${s.name}</span><span style="margin-left:auto;opacity:.6">${elapsed}s</span></div>`;
  }).join('');
}

function syncLogStart(activityId, name) {
  _syncActive.set(activityId, { name, startTime: Date.now() });
  syncLogUpdate();
  // Aggiorna elapsed ogni secondo finché attivo
  const timer = setInterval(() => {
    if (_syncActive.has(activityId)) syncLogUpdate();
    else clearInterval(timer);
  }, 1000);
}

function syncLogDone(activityId, msg, isError) {
  _syncActive.delete(activityId);
  syncLogUpdate();
  // Mostra messaggio finale brevemente nel log
  if (msg) {
    const el = document.getElementById('sync-log');
    el.style.display = 'flex';
    const row = document.createElement('div');
    row.className = `sync-log-row ${isError ? 'error' : 'done'}`;
    row.textContent = msg;
    el.prepend(row);
    setTimeout(() => { row.remove(); if (_syncActive.size === 0) el.style.display = 'none'; }, 4000);
  }
}

// ── SETTINGS ─────────────────────────────────────────────────────
let appSettings = {};

async function loadSettings() {
  try { appSettings = await api('/api/settings'); } catch(e) {}
  // Precompila form
  if (appSettings.weight_kg) document.getElementById('cfg-weight').value = appSettings.weight_kg;
  if (appSettings.bike_kg)   document.getElementById('cfg-bike').value   = appSettings.bike_kg;
  if (appSettings.crr) {
    const sel = document.getElementById('cfg-crr');
    [...sel.options].forEach(o => { if (Math.abs(+o.value - +appSettings.crr) < 0.001) o.selected = true; });
  }
  if (appSettings.cda) {
    const sel = document.getElementById('cfg-cda');
    [...sel.options].forEach(o => { if (Math.abs(+o.value - +appSettings.cda) < 0.001) o.selected = true; });
  }
  if (appSettings.overlay_timeout_s != null) {
    document.getElementById('cfg-overlay-timeout').value = appSettings.overlay_timeout_s;
  }
  await loadAiProviderConfig();
}

// ── STRAVA AUTH STATUS ───────────────────────────────────────────
let _stravaAuthStatus = null;

function _formatExpiry(seconds) {
  if (seconds >= 3600) return Math.floor(seconds/3600) + 'h ' + Math.floor((seconds%3600)/60) + 'm';
  if (seconds >= 60) return Math.floor(seconds/60) + 'm';
  return seconds + 's';
}

async function loadStravaAuthStatus() {
  try {
    _stravaAuthStatus = await api('/api/strava/auth-status');
  } catch(e) {
    _stravaAuthStatus = { authenticated: false };
  }
  _renderStravaAuthBadge();
  _renderStravaAuthSettings();
}

function _renderStravaAuthBadge() {
  const dot = document.getElementById('strava-auth-dot');
  const btn = document.getElementById('btn-settings');
  if (!dot || !btn) return;
  const s = _stravaAuthStatus || {};
  dot.classList.remove('dot-ok','dot-warn','dot-err','dot-none');
  if (!s.authenticated) {
    dot.classList.add('dot-err');
    btn.title = t('strava.authNone');
  } else if (s.expired) {
    dot.classList.add('dot-err');
    btn.title = t('strava.authExpired');
  } else if (s.expires_in_seconds < 600) {
    dot.classList.add('dot-warn');
    btn.title = t('strava.expiresIn', {time: _formatExpiry(s.expires_in_seconds)});
  } else {
    dot.classList.add('dot-ok');
    btn.title = t('strava.expiresIn', {time: _formatExpiry(s.expires_in_seconds)});
  }
}

function _renderStravaAuthSettings() {
  const s = _stravaAuthStatus || {};
  const statusText = document.getElementById('strava-status-text');
  const statusDetail = document.getElementById('strava-status-detail');
  const hintEl = document.getElementById('strava-login-hint');
  if (!statusText) return;

  if (!s.authenticated) {
    statusText.textContent = t('strava.authNone');
    statusText.style.color = 'var(--orange)';
    statusDetail.textContent = '';
    if (hintEl) hintEl.style.display = 'block';
  } else if (s.expired) {
    statusText.textContent = t('strava.authExpired');
    statusText.style.color = 'var(--orange)';
    statusDetail.textContent = '';
    if (hintEl) hintEl.style.display = 'none';
  } else {
    const expSec = s.expires_in_seconds || 0;
    if (expSec < 600) {
      statusText.textContent = t('strava.authExpiring');
      statusText.style.color = '#ffc107';
    } else {
      statusText.textContent = t('strava.authConnected');
      statusText.style.color = 'var(--green)';
    }
    statusDetail.textContent = t('strava.expiresIn', {time: _formatExpiry(expSec)});
    if (hintEl) hintEl.style.display = 'none';
  }

  // Pre-fill client_id
  if (s.client_id) {
    const inp = document.getElementById('cfg-strava-client-id');
    if (inp && !inp.value) inp.value = s.client_id;
  }
}

// Save Strava credentials
document.getElementById('strava-save-creds').addEventListener('click', async () => {
  const msgEl = document.getElementById('strava-auth-msg');
  const clientId = document.getElementById('cfg-strava-client-id').value.trim();
  const clientSecret = document.getElementById('cfg-strava-client-secret').value.trim();
  if (!clientId || !clientSecret) {
    msgEl.innerHTML = `<span style="color:var(--orange)">${t('strava.credentialsFailed', {error: 'client_id / client_secret'})}</span>`;
    return;
  }
  try {
    const res = await api('/api/strava/auth-config', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({client_id: clientId, client_secret: clientSecret})
    });
    msgEl.innerHTML = `<span style="color:var(--green)">${t('strava.credentialsSaved')}</span>`;
    setTimeout(() => msgEl.textContent = '', 3000);
    await loadStravaAuthStatus();
  } catch(e) {
    msgEl.innerHTML = `<span style="color:var(--orange)">${t('strava.credentialsFailed', {error: e.message})}</span>`;
  }
});

// Refresh Strava token
document.getElementById('strava-refresh-token').addEventListener('click', async () => {
  const btn = document.getElementById('strava-refresh-token');
  const msgEl = document.getElementById('strava-auth-msg');
  btn.disabled = true;
  btn.textContent = t('strava.refreshing');
  msgEl.textContent = '';
  try {
    const res = await api('/api/strava/auth-refresh', {method: 'POST'});
    msgEl.innerHTML = `<span style="color:var(--green)">${t('strava.refreshOk')}</span>`;
    setTimeout(() => msgEl.textContent = '', 3000);
    await loadStravaAuthStatus();
  } catch(e) {
    msgEl.innerHTML = `<span style="color:var(--orange)">${t('strava.refreshFailed', {error: e.message})}</span>`;
  }
  btn.disabled = false;
  btn.textContent = t('strava.refreshToken');
});

document.getElementById('btn-settings').addEventListener('click', () => {
  document.getElementById('settings-modal').classList.add('open');
  loadStravaAuthStatus(); // aggiorna stato ogni volta che si apre
});
document.getElementById('settings-close').addEventListener('click', () => {
  document.getElementById('settings-modal').classList.remove('open');
});
document.getElementById('settings-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('settings-modal'))
    document.getElementById('settings-modal').classList.remove('open');
});
document.getElementById('settings-save').addEventListener('click', async () => {
  const payload = {
    weight_kg: document.getElementById('cfg-weight').value || '75',
    bike_kg:   document.getElementById('cfg-bike').value   || '10',
    crr:       document.getElementById('cfg-crr').value,
    cda:       document.getElementById('cfg-cda').value,
    overlay_timeout_s: document.getElementById('cfg-overlay-timeout').value || '120',
  };
  await api('/api/settings', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload) });
  // Salva anche configurazione AI
  const aiCfg = _collectAiConfig();
  if (aiCfg.provider) {
    await api('/api/ai/config', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify(aiCfg)
    });
    _aiActiveModel = aiCfg.model;
    _aiSavedAuth[aiCfg.provider] = aiCfg.auth;
  }
  // Ricarica settings dal server per avere tutto in sync
  try { appSettings = await api('/api/settings'); } catch(e) {}
  const saved = document.getElementById('settings-saved');
  saved.textContent = t('settings.saved');
  setTimeout(() => saved.textContent = '', 2000);
  // Ricarica summary attivo se aperto
  if (currentActivityId) showActivitySummary(currentActivityId);
});

function attachNotesSave(ta) {
  ta.addEventListener('click', e => e.stopPropagation());
  let timer;
  ta.addEventListener('input', () => {
    const id = +ta.dataset.id;
    const st = document.getElementById('ns-'+id);
    if(st) st.textContent = '✎ …';
    clearTimeout(timer);
    timer = setTimeout(async () => {
      await fetch(`${API}/api/activities/${id}/notes`, {
        method:'PATCH', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({notes: ta.value})
      });
      const act = allActivities.find(a => a.activity_id===id);
      if(act) act.notes = ta.value;
      if(st) { st.textContent=t('misc.saved'); setTimeout(()=>st.textContent='',2000); }
    }, 800);
  });
}

function renderActivities() {
  const el = document.getElementById('act-list');
  if (!allActivities.length) {
    el.innerHTML = `<div style="padding:24px;text-align:center;color:var(--text2)">${t('left.noActivities')}</div>`;
    return;
  }
  el.innerHTML = allActivities.map(a => {
    const date = a.activity_date ? a.activity_date.slice(0,10) : t('left.unknownDate');
    const dist = (a.total_distance_m/1000).toFixed(1);
    const ele  = Math.round(a.total_elevation_m);
    const stravaCount = a.strava_effort_count || 0;
    const autoCount   = a.auto_effort_count   || 0;
    const histCount   = a.historical_effort_count || 0;
    let segBadge = '';
    if (stravaCount > 0 || autoCount > 0 || histCount > 0) {
      const parts = [];
      if (stravaCount > 0) parts.push(`<span class="act-seg-count strava-count">⚡${stravaCount}</span>`);
      if (histCount   > 0) parts.push(`<span class="act-seg-count hist-count">◈${histCount}</span>`);
      if (autoCount   > 0) parts.push(`<span class="act-seg-count auto-count">⬡${autoCount}</span>`);
      segBadge = `<div style="display:flex;gap:4px;margin-top:3px">${parts.join('')}</div>`;
    } else if (a.strava_activity_id) {
      segBadge = `<div style="margin-top:3px"><span class="act-seg-count no-seg">${t('left.noSegment')}</span></div>`;
    }
    return `<div class="act-item ${a.activity_id===currentActivityId?'active':''}" data-id="${a.activity_id}">
      <div style="display:flex;align-items:center;gap:4px">
        <div class="act-name" style="flex:1">${a.activity_name || a.filename.replace('.gpx','')}</div>
        ${a.effort_count>0 ? `<span class="act-expand ${a.activity_id===currentActivityId?'open':''}" data-expand="${a.activity_id}">▶</span>` : ''}
      </div>
      <div class="act-meta">${date} · ${dist} ${t('unit.km')} · +${ele} ${t('unit.m')}
        <span class="act-edit" data-id="${a.activity_id}" title="${t('left.editTitle')}">✏️</span>
        <span class="act-refresh" data-id="${a.activity_id}" title="${t('left.refreshTitle')}">🔄</span>
        <span class="act-delete" data-id="${a.activity_id}" title="${t('left.deleteTitle')}">🗑</span>
      </div>
      ${segBadge}
      <div class="strava-fetch-bar">
        <input class="strava-id-input" type="number" placeholder="${t('left.stravaIdPlaceholder')}"
               data-id="${a.activity_id}" value="${a.strava_activity_id||''}"
               title="${t('left.stravaIdTitle')}">
        <button class="fetch-btn" data-id="${a.activity_id}"
                style="${a.strava_effort_count>0?'background:var(--green)':''}">
          ${a.strava_effort_count>0?'⟳ Strava':'⚡ Strava'}
        </button>
      </div>
      <div class="fetch-status" id="fs-${a.activity_id}">
        ${a.strava_effort_count>0?`<span style="color:var(--green)">✓ ${a.strava_effort_count} ${t('left.fromStrava')}</span>`:''}
      </div>
      <div class="act-tree ${a.activity_id===currentActivityId?'open':''}" id="tree-${a.activity_id}"></div>

    </div>`;
  }).join('');

  // Event delegation: tutti i click su act-list gestiti qui — nessun listener multiplo

  el.querySelectorAll('.act-notes-area').forEach(attachNotesSave);

  // ── Fetch effort da Strava API ────────────────────────────────
  el.querySelectorAll('.strava-id-input').forEach(inp => {
    inp.addEventListener('click', e => e.stopPropagation());
    inp.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        e.preventDefault();
        inp.closest('.act-item').querySelector('.fetch-btn').click();
      }
    });
  });

  el.querySelectorAll('.fetch-btn').forEach(btn => {
    btn.addEventListener('click', async e => {
      e.stopPropagation();
      const id = +btn.dataset.id;
      const input = el.querySelector(`.strava-id-input[data-id="${id}"]`);
      const statusEl = document.getElementById('fs-' + id);
      const stravaId = input ? input.value.trim() : '';
      if (!stravaId) {
        if (statusEl) statusEl.innerHTML = `<span style="color:var(--orange)">⚠ Inserisci l'ID attività Strava</span>`;
        return;
      }
      btn.disabled = true;
      const act0 = allActivities.find(a => a.activity_id === id);
      const actName = act0 ? (act0.activity_name || act0.filename) : `#${id}`;
      showGlobalLoading(t('fetch.fetching'), actName);
      try {
        const res = await fetch(`${API}/api/activities/${id}/strava-efforts`, {
          method: 'POST', headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({strava_activity_id: +stravaId}),
          signal: getOverlaySignal()
        });
        const data = await res.json();
        if (data.error) throw new Error(data.error);
        if (statusEl) statusEl.innerHTML =
          `<span style="color:var(--green)">✓ ${data.saved} effort importati da Strava</span>`;
        btn.textContent = '⟳ Strava';
        btn.style.background = 'var(--green)';
        const act = allActivities.find(a => a.activity_id === id);
        if (act) {
          act.strava_effort_source  = 'strava_api';
          act.strava_activity_id    = +stravaId;
          act.strava_effort_count   = (act.strava_effort_count || 0) + data.saved;
          act.effort_count          = (act.effort_count || 0) + data.saved;
        }
        await loadActivities();
        if (currentActivityId === id) {
          const efforts = await api(`/api/activities/${id}/efforts`);
          currentEfforts = efforts;
          populateTree(id, efforts);
          clearMapLayers();
          showEffortsOnMap(efforts);
        }
        await loadStatus();
      } catch(err) {
        if (err.name !== 'AbortError' && statusEl) statusEl.innerHTML =
          `<span style="color:var(--orange)">⚠ ${err.message}</span>`;
      }
      hideGlobalLoading();
      btn.disabled = false;
    });
    btn.addEventListener('click', e => e.stopPropagation());
  });
}

async function selectActivity(id) {
  // Toggle: se già selezionata, deseleziona
  if (currentActivityId === id) {
    currentActivityId = null;
    activeSegmentId = null;
    activeEffortId = null;
    currentEfforts = [];
    currentTrack = null;
    currentStreamLength = null;
    document.getElementById('right').classList.remove('open');
    renderActivities();
    clearMapLayers();
    return;
  }
  currentActivityId = id;
  activeSegmentId = null;
  activeEffortId = null;
  document.getElementById('right').classList.remove('open');
  clearMapLayers();

  const efforts = await api(`/api/activities/${id}/efforts`);
  currentEfforts = efforts;
  renderActivities();       // dopo aver caricato efforts, così tree-${id} esiste
  const activeEl = document.querySelector(`.act-item[data-id="${id}"]`);
  if (activeEl) activeEl.scrollIntoView({behavior:'smooth', block:'nearest'});
  populateTree(id, efforts);
  showEffortsOnMap(efforts);
  showActivitySummary(id);
}

async function showActivitySummary(id) {
  const act = allActivities.find(a => a.activity_id === id);
  document.getElementById('right-seg-name').textContent = act ? (act.activity_name || act.filename || '—') : '—';
  document.getElementById('right-body').innerHTML = '<div style="padding:24px;text-align:center;color:var(--text2)">Caricamento…</div>';
  document.getElementById('right').classList.add('open');
  try {
    const [s, medals, powerBestsResp] = await Promise.all([
      api(`/api/activities/${id}/summary`),
      api(`/api/activities/${id}/medals`).catch(() => []),
      api(`/api/activities/${id}/power-bests-ranked`).catch(() => ({ bests: [] }))
    ]);
    renderActivitySummary(s, medals, powerBestsResp.bests || [], powerBestsResp.warning || null);
  } catch(e) {
    document.getElementById('right-body').innerHTML = `<div style="padding:16px;color:var(--orange)">${t('error.generic', {message: e.message})}</div>`;
  }
}

function renderActivitySummary(s, medals, powerBests, powerWarning) {
  powerBests = powerBests || [];
  const fmt = v => v != null ? Math.round(v) : null;
  const fmtTime = secs => {
    if (!secs) return null;
    const h = Math.floor(secs/3600), m = Math.floor((secs%3600)/60), sc = secs%60;
    return h>0 ? `${h}h ${m}m` : `${m}m ${sc<10?'0':''}${sc}s`;
  };

  const fmtVal = v => v != null ? Math.round(v) : null;
  const empty = v => !v || v === '—';

  // Celle semplici (sempre visibili)
  const simpleCells = [
    { label: t('summary.distance'),   value: s.total_distance_m >= 1000 ? (s.total_distance_m/1000).toFixed(1)+' '+t('unit.km') : (s.total_distance_m ? Math.round(s.total_distance_m)+' '+t('unit.m') : '—') },
    { label: t('summary.elevation'), value: s.total_elevation_m ? '+'+Math.round(s.total_elevation_m)+' '+t('unit.m') : '—' },
    { label: t('summary.time'),      value: fmtTime(s.moving_time_s) || '—' },
    { label: t('summary.avgSpeed'),  value: s.total_distance_m && s.moving_time_s
        ? `${(s.total_distance_m / s.moving_time_s * 3.6).toFixed(1)} ${t('unit.kmh')}`
        : '—' },
    { label: t('summary.avgPower'),       value: s.avg_watts
        ? `${fmt(s.avg_watts)} ${t('unit.w')}`

            ? `<span style="color:var(--orange)" title="${t('summary.estimatedTitle')}">${fmt(s.avg_watts_estimated)} ${t('unit.w')}</span>`
            : '—') },
    { label: t('summary.calories'),    value: s.calories ? `${Math.round(s.calories)} ${t('unit.kcal')}` : '—' },

  const simpleCellsHtml = simpleCells.map(x => `
    <div class="summary-cell">

      </div>

let _aiProviders = [];
let _aiActive = '';
let _aiActiveModel = '';
let _aiSavedAuth = {};

async function loadAiProviderConfig() {
  try {
    const data = await api('/api/ai/providers');
    _aiProviders = data.providers || [];
    _aiActive = data.active || '';
    _aiActiveModel = data.active_model || '';
    _aiSavedAuth = data.saved_auth || {};
  } catch(e) { _aiProviders = []; }
  renderAiProviderConfig();
}

function renderAiProviderConfig() {
  const container = document.getElementById('ai-provider-config');
  if (!container) return;

  // Provider selector
  let html = `<div class="settings-row">
    <label>${t('ai.provider')}</label>
    <select id="cfg-ai-provider" style="width:200px">
      <option value="">— ${t('ai.selectProvider')} —</option>
      ${_aiProviders.map(p => `<option value="${p.id}" ${p.id===_aiActive?'selected':''}>${p.name}</option>`).join('')}
    </select>
  </div>`;

  // Model selector (per il provider attivo)
  const active = _aiProviders.find(p => p.id === _aiActive);
  if (active && active.models.length) {
    html += `<div class="settings-row" style="margin-top:6px">
      <label>${t('ai.model')}</label>
      <select id="cfg-ai-model" style="width:200px">
        ${active.models.map(m => `<option value="${m}" ${m===(_aiActiveModel||active.default_model)?'selected':''}>${m}</option>`).join('')}
      </select>
    </div>`;
  }

  // Auth fields per il provider attivo
  if (active) {
    const savedAuth = _aiSavedAuth[active.id] || {};
    for (const field of active.auth_fields) {
      html += `<div class="settings-row" style="margin-top:6px">
        <label>${field.label}</label>
        <input type="${field.type||'password'}" class="ai-auth-field"
               data-provider="${active.id}" data-field="${field.key}"
               value="${savedAuth[field.key]||''}"
               placeholder="${field.placeholder||''}" style="width:200px">
      </div>`;
    }
    // Hint
    const lang = I18N.getLang();
    const hint = active.hint_html[lang] || active.hint_html['en'] || '';
    if (hint) {
      html += `<div style="font-size:10px;color:var(--text2);margin-top:2px">${hint}</div>`;
    }
  }

  container.innerHTML = html;

  // Events
  const providerSel = document.getElementById('cfg-ai-provider');
  if (providerSel) {
    providerSel.addEventListener('change', () => {
      _aiActive = providerSel.value;
      _aiActiveModel = '';
      renderAiProviderConfig();
    });
  }
}

function _collectAiConfig() {
  const providerId = document.getElementById('cfg-ai-provider')?.value || '';
  const modelSel = document.getElementById('cfg-ai-model');
  const model = modelSel ? modelSel.value : '';
  const auth = {};
  document.querySelectorAll('.ai-auth-field').forEach(inp => {
    if (inp.dataset.provider === providerId) {
      auth[inp.dataset.field] = inp.value.trim();
    }
  });
  return {provider: providerId, model, auth};
}

async function runAiAnalysis(activityId) {
  const btn = document.getElementById('ai-analyze-btn');
  const statusEl = document.getElementById('ai-status-' + activityId);
  const ta = document.querySelector('.detail-notes');

  // Verifica provider configurato
  if (!appSettings.ai_provider && !_aiActive) {
    if (statusEl) statusEl.innerHTML = `<span style="color:var(--orange)">${t('ai.noProvider')}</span>`;
    return;
  }

  btn.disabled = true;
  btn.classList.add('loading');
  btn.textContent = '⟳';
  if (statusEl) statusEl.innerHTML = `<span style="color:var(--text2)">${t('ai.analyzing')}</span>`;

  try {
    const res = await fetch(`${API}/api/activities/${activityId}/ai-analysis`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({lang: I18N.getLang()})
    });
    const data = await res.json();
    if (!res.ok || data.error) throw new Error(data.error || 'Unknown error');

    // Aggiorna textarea con le nuove note (contengono l'analisi)
    if (ta) ta.value = data.notes;
    // Aggiorna anche l'array in-memory
    const act = allActivities.find(a => a.activity_id === activityId);
    if (act) act.notes = data.notes;

    if (statusEl) {
      statusEl.innerHTML = `<span style="color:var(--green)">${t('ai.done')}</span>`;
      setTimeout(() => statusEl.textContent = '', 5000);
    }
  } catch(err) {
    if (statusEl) statusEl.innerHTML = `<span style="color:var(--orange)">${t('ai.error', {error: err.message})}</span>`;
  }

  btn.disabled = false;
  btn.classList.remove('loading');
  btn.textContent = t('ai.btn');
}

}

async function showEffortsOnMap(efforts, activeSegId, activeEffortId) {
  // 1. Tracciato GPX completo in grigio (sfondo)
  if (currentActivityId) {
    try {
      const resp = await api(`/api/activities/${currentActivityId}/gpx-track`);
      const track = resp.track || resp; // compatibilità formato vecchio/nuovo
      const streamLength = resp.stream_length || null;
      currentTrack = track;
      currentStreamLength = streamLength;

      if (track && track.length > 1) {
        const gpxLayer = L.polyline(track, {
          color: '#444', weight: 2, opacity: 0.45
        }).addTo(map);
        mapLayers.push(gpxLayer);

        // 2. Tratte non coperte da segmenti in giallo
        const hasIndices = efforts.some(e => e.start_idx != null && e.end_idx != null);
        if (efforts.length && hasIndices) {
          // stream_length: lunghezza originale dello stream (per normalizzare indici decimati)
          const sLen = streamLength || efforts[0].total_points || track.length;
          const tLen = track.length;

          const covered = new Uint8Array(tLen);
          for (const e of efforts) {
            if (e.start_idx == null || e.end_idx == null) continue;
            // Normalizza indici stream → indici track decimata
            const si = Math.round(e.start_idx * (tLen - 1) / (sLen - 1));
            const ei = Math.round(e.end_idx   * (tLen - 1) / (sLen - 1));
            for (let i = Math.max(0, si); i <= Math.min(tLen - 1, ei); i++) covered[i] = 1;
          }

          // Raggruppa tratte non coperte e disegnale in giallo tratteggiato
          let seg = [];
          for (let i = 0; i < tLen; i++) {
            if (!covered[i]) {
              seg.push(track[i]);
            } else {
              if (seg.length > 2) {
                const gl = L.polyline(seg, {color:'#f5c400', weight:3, opacity:.8,
                  dashArray:'8,5'}).addTo(map);
                gl.bindTooltip(t('map.unsegmentedSection'), {sticky:true});
                mapLayers.push(gl);
              }
              seg = [];
            }
          }
          if (seg.length > 2) {
            const gl = L.polyline(seg, {color:'#f5c400', weight:3, opacity:.8,
              dashArray:'8,5'}).addTo(map);
            gl.bindTooltip(t('map.unsegmentedSection'), {sticky:true});
            mapLayers.push(gl);
          }
        }

        if (!efforts.length) {
          if (panMode) map.panTo(gpxLayer.getBounds().getCenter());
          else map.fitBounds(gpxLayer.getBounds(), {padding:[30,30]});
        }
      }
    } catch(ex) { console.warn('GPX track load failed:', ex); }
  }

  // 3. Segmenti sopra (Strava arancio, historical arancio chiaro, auto azzurro)
  const effortColors = new Set(['#fc4c02','#ff8c42','#40b4e0']);
  efforts.forEach(e => {
    let coords = null;
    if (e.polyline) {
      try { coords = decodePolyline(e.polyline).map(c=>[c[0],c[1]]); } catch(ex){}
    }
    if (!coords && e.start_idx != null && e.end_idx != null && currentTrack && currentTrack.length > 1) {
      const sLen = currentStreamLength || e.total_points || currentTrack.length;
      const tLen = currentTrack.length;
      const si = Math.max(0, Math.round(e.start_idx * (tLen - 1) / (sLen - 1)));
      const ei = Math.min(tLen - 1, Math.round(e.end_idx * (tLen - 1) / (sLen - 1)));
      if (ei > si) coords = currentTrack.slice(si, ei + 1);
    }
    if (!coords || coords.length < 2) return;
    try {
      const effortColor = e.source==='historical' ? '#ff8c42'
                        : e.source==='auto'       ? '#40b4e0'
                        : '#fc4c02'; // strava_api
      const isDimmed = activeSegId && e.segment_id !== activeSegId;
      const layer = L.polyline(coords, {color:effortColor, weight:isDimmed?2:3, opacity:isDimmed?.35:.85})
        .addTo(map).bindTooltip(e.name, {sticky:true});
      layer.on('click', () => selectSegment(e.segment_id, e.effort_id));
      mapLayers.push(layer);
    } catch(ex){}
  });

  if (efforts.length) {
    const segLayers = mapLayers.filter(l => l.options && effortColors.has(l.options.color));
    if (segLayers.length) {
      const group = L.featureGroup(segLayers);
      if (panMode) map.panTo(group.getBounds().getCenter());
      else map.fitBounds(group.getBounds(), {padding:[30,30]});
    }
  }
}

// ── SEGMENT DETAIL ────────────────────────────────────────────────
async function selectSegment(segId, effortId) {
  activeSegmentId = segId;
  activeEffortId = effortId;

  // Evidenzia riga tree attiva usando effort_id
  document.querySelectorAll('.tree-seg').forEach(c =>
    c.classList.toggle('active', +c.dataset.effortId === effortId));

  // Evidenzia layer sulla mappa - trova l'effort specifico
  const effort = currentEfforts.find(e => e.effort_id === effortId);
  clearMapLayers();
  showEffortsOnMap(currentEfforts, segId, effortId);  // passa effortId per evidenziare solo quello
  
  if (effort) {
    let coords = null;
    if (effort.polyline) {
      try { coords = decodePolyline(effort.polyline).map(c=>[c[0],c[1]]); } catch(ex){}
    }
    if (!coords && effort.start_idx != null && effort.end_idx != null && currentTrack && currentTrack.length > 1) {
      const sLen = currentStreamLength || effort.total_points || currentTrack.length;
      const tLen = currentTrack.length;
      const si = Math.max(0, Math.round(effort.start_idx * (tLen - 1) / (sLen - 1)));
      const ei = Math.min(tLen - 1, Math.round(effort.end_idx * (tLen - 1) / (sLen - 1)));
      if (ei > si) coords = currentTrack.slice(si, ei + 1);
    }
    if (coords && coords.length >= 2) {
      const hl0 = L.polyline(coords, {color:'#fff', weight:9, opacity:.6}).addTo(map);
      const hl1 = L.polyline(coords, {color:'#ffe000', weight:5, opacity:1}).addTo(map);
      mapLayers.push(hl0, hl1);
      if (!panMode) mapFocusLayer(hl0);
    }
  }

  // Carica storico del segmento
  document.getElementById('right-seg-name').textContent = effort ? effort.name : '—';
  document.getElementById('right-body').innerHTML = `<div style="padding:24px;text-align:center;color:var(--text2)">${t('left.loading')}</div>`;
  document.getElementById('right').classList.add('open');

  try {
    const history = await api(`/api/segments/${segId}/efforts`);
    renderSegmentHistory(effort, history, effortId);  // passa effortId per evidenziare nella tabella
  } catch(e) {
    document.getElementById('right-body').innerHTML = `<div style="padding:16px;color:var(--orange)">${t('error.generic', {message: e.message})}</div>`;
  }
}

function _segExtraStats(best, seg) {
  const vamBest = best.vam;
  let wattBest = null;
  try {
    const grade = seg ? (seg.avg_grade_pct || best.avg_grade_pct || 0) : (best.avg_grade_pct || 0);
    if (grade > 0 && grade < 35) {
      const m   = +(appSettings.weight_kg||75) + +(appSettings.bike_kg||10);
      const crr = +(appSettings.crr||0.005);
      const cda = +(appSettings.cda||0.35);
      const d   = (seg ? (seg.distance_m||seg.distance) : best.distance_m) || 0;
      const tt   = best.elapsed_seconds || 0;
      const el  = grade / 100 * d;
      if (d > 0 && tt > 0 && el > 0) {
        const v = Math.min(d/tt, 35);
        const slope = Math.min(el/d, 0.35);
        const fg = m*9.81*Math.sin(Math.atan(slope));
        const fr = m*9.81*Math.cos(Math.atan(slope))*crr;
        const fa = 0.5*1.225*cda*v*v;
        const w = Math.round(Math.max(0, Math.min((fg+fr+fa)*v, 2500)));
        if (w > 0 && w <= 2500) wattBest = w;
      }
    }
  } catch(e) {}
  if (!vamBest && !wattBest) return '';
  const cells = [];
  if (vamBest)  cells.push(`<div class="stat-cell"><div class="label">${t('segment.vamBest')}</div><div class="value" style="color:var(--orange)">&#9650;${vamBest} ${t('unit.mh')}</div></div>`);
  if (wattBest) cells.push(`<div class="stat-cell"><div class="label">${t('segment.estimatedWatts')}</div><div class="value" style="color:var(--orange)">${wattBest} ${t('unit.w')}</div></div>`);
  return '<div class="seg-stats-bar" style="grid-template-columns:repeat('+cells.length+',1fr)">'+cells.join('')+'</div>';
}

function renderSegmentHistory(seg, efforts, activeEffortId) {
  if (!efforts.length) {
    document.getElementById('right-body').innerHTML =
      `<div style="padding:24px;text-align:center;color:var(--text2)">${t('segment.noHistory')}</div>`;
    return;
  }
  const best = efforts[0];
  const dist = seg && seg.distance_m >= 1000
    ? (seg.distance_m/1000).toFixed(2)+' '+t('unit.km') : (seg ? Math.round(seg.distance_m)+' '+t('unit.m') : '—');
  const grade = seg && seg.avg_grade_pct
    ? (seg.avg_grade_pct>0?'+':'')+seg.avg_grade_pct.toFixed(1)+'%' : '—';

  let html = `
  <div class="seg-stats-bar">
    <div class="stat-cell"><div class="label">${t('segment.distance')}</div><div class="value">${dist}</div></div>
    <div class="stat-cell"><div class="label">${t('segment.grade')}</div><div class="value">${grade}</div></div>
    <div class="stat-cell"><div class="label">${t('segment.bestTime')}</div><div class="value" style="color:var(--gold)">${formatTime(best.elapsed_seconds)}</div></div>
  </div>
  ${_segExtraStats(best, seg)}
  <div class="chart-section">
    <div class="section-title">${t('segment.trendTitle')}</div>
    <div class="chart-container"><canvas id="speed-chart"></canvas></div>
  </div>
  <div class="efforts-section">
    <div class="section-title">${t('segment.history', {count: efforts.length})}</div>
    <table class="efforts-table">
      <thead><tr><th>${t('table.rank')}</th><th>${t('table.date')}</th><th>${t('table.time')}</th><th>${t('table.speed')}</th><th>${t('table.hr')}</th><th>${t('table.vam')}</th><th>${t('table.delta')}</th></tr></thead>
      <tbody>${efforts.map(e => {
        const rc = e.rank<=3 ? `rank-${e.rank}` : 'rank-n';
        const delta = e.rank===1
          ? '<span class="delta-best is-best">🏆</span>'
          : `<span class="delta-best">+${formatTime(e.delta_from_best)}</span>`;
        const date = e.activity_date ? e.activity_date.slice(0,10) : '—';
        const hrTd = (e.average_heartrate != null)
          ? `<td>${Math.round(e.average_heartrate)}</td>`
          : '<td style="color:var(--text2)">—</td>';
        const vamTd = e.vam ? `<td style="color:var(--orange);font-size:11px">▲${e.vam}</td>` : '<td style="color:var(--text2)">—</td>';
        const isCurrent = e.effort_id === activeEffortId;
        return `<tr class="${isCurrent?'cur-act-row':''}" data-eid="${e.effort_id}">
          <td><span class="rank-badge ${rc}">${e.rank}</span></td>
          <td style="font-size:11px;color:var(--text2)">${date}</td>
          <td style="font-weight:600">${formatTime(e.elapsed_seconds)}</td>
          <td>${(e.avg_speed_kmh||0).toFixed(1)}</td>
          ${hrTd}
          ${vamTd}
          <td>${delta}</td>
        </tr>`;
      }).join('')}</tbody>
    </table>
  </div>`;

  // Aggiungi note dell'attività corrente in fondo al pannello
  const act = allActivities.find(a => a.activity_id === currentActivityId);
  if (act !== undefined) {
    html += `<div class="notes-panel">
      <div class="section-title" style="padding:10px 14px 4px">${t('segment.rideNotes')}</div>
      <div style="padding:0 14px 14px">
        <textarea class="act-notes-area detail-notes" data-id="${act.activity_id}"
          placeholder="${t('summary.notesPlaceholder')}">${act.notes||''}</textarea>
        <div class="notes-saved" id="ns-${act.activity_id}"></div>
      </div>
    </div>`;
  }
  document.getElementById('right-body').innerHTML = html;
  // Collega evento save sulla textarea nel pannello
  const detailTa = document.querySelector('.detail-notes');
  if (detailTa) attachNotesSave(detailTa);
  requestAnimationFrame(() => {
    const cur = document.querySelector('.cur-act-row');
    if (cur) cur.scrollIntoView({block:'nearest',behavior:'smooth'});
    renderTrendChart(efforts);
  });
}

function renderTrendChart(efforts) {
  if (speedChart) { speedChart.destroy(); speedChart = null; }
  const ctx = document.getElementById('speed-chart');
  if (!ctx) return;

  const sorted = [...efforts].sort((a,b) => {
    const da = a.activity_date||a.filename, db = b.activity_date||b.filename;
    return da<db?-1:da>db?1:0;
  });
  const labels = sorted.map(e => e.activity_date ? e.activity_date.slice(0,10) : '—');
  const times  = sorted.map(e => +(e.elapsed_seconds/60).toFixed(2));

  if (times.length < 2) return;

  speedChart = new Chart(ctx, {
    type:'line',
    data:{
      labels,
      datasets:[
        {label:'Tempo',data:times,borderColor:'#fc4c02',backgroundColor:'rgba(252,76,2,.12)',
         borderWidth:2,pointRadius:4,pointBackgroundColor:'#fc4c02',tension:.3,fill:true}
      ]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{
        legend:{display:false},
        tooltip:{callbacks:{label:ctx=>ctx.datasetIndex===0?formatTime(sorted[ctx.dataIndex].elapsed_seconds):null}}
      },
      scales:{
        x:{ticks:{color:'#8b90b0',font:{size:10},maxRotation:30},grid:{color:'#2e3148'}},
        y:{reverse:true,ticks:{color:'#8b90b0',font:{size:10},callback:v=>{const m=Math.floor(v);const s=Math.round((v-m)*60);return m+':'+(s<10?'0':'')+s;}},grid:{color:'#2e3148'}}
      }
    }
  });
}

let _pendingImportResults = [];

let _overlayAbort = null;   // current AbortController (null when idle)
let _overlayTimer = null;   // countdown setInterval id
let _overlayTimeout = null; // setTimeout id for auto-cancel

function _getOverlayTimeoutSec() {
  const v = parseInt(appSettings.overlay_timeout_s, 10);
  return (!isNaN(v) && v >= 0) ? v : 120; // default 120 s, 0 = disabled
}

function showGlobalLoading(msg, detail) {
  // Abort any previous overlay operation
  if (_overlayAbort) { try { _overlayAbort.abort(); } catch(e){} }
  clearInterval(_overlayTimer);
  clearTimeout(_overlayTimeout);

  _overlayAbort = new AbortController();
  const el = document.getElementById('global-loading');
  el.querySelector('.loading-text').textContent = msg || t('import.inProgress');
  document.getElementById('loading-detail').textContent = detail || '';
  document.getElementById('loading-countdown').textContent = '';
  el.classList.add('active');

  const timeoutSec = _getOverlayTimeoutSec();
  if (timeoutSec > 0) {
    let remaining = timeoutSec;
    document.getElementById('loading-countdown').textContent = t('overlay.timeRemaining', {seconds: remaining});
    _overlayTimer = setInterval(() => {
      remaining--;
      if (remaining > 0) {
        document.getElementById('loading-countdown').textContent = t('overlay.timeRemaining', {seconds: remaining});
      } else {
        clearInterval(_overlayTimer);
        _overlayTimer = null;
      }
    }, 1000);
    _overlayTimeout = setTimeout(() => {
      clearInterval(_overlayTimer);
      _overlayTimer = null;
      if (_overlayAbort) { _overlayAbort.abort(); _overlayAbort = null; }
      document.getElementById('global-loading').classList.remove('active');
      alert(t('overlay.timedOut', {seconds: timeoutSec}));
    }, timeoutSec * 1000);
  }
}

function hideGlobalLoading() {
  clearInterval(_overlayTimer);
  clearTimeout(_overlayTimeout);
  _overlayTimer = null;
  _overlayTimeout = null;
  _overlayAbort = null;
  document.getElementById('global-loading').classList.remove('active');
}

function cancelGlobalLoading() {
  if (_overlayAbort) { _overlayAbort.abort(); _overlayAbort = null; }
  hideGlobalLoading();
}

function getOverlaySignal() {
  return _overlayAbort ? _overlayAbort.signal : undefined;
}

document.getElementById('loading-cancel').addEventListener('click', cancelGlobalLoading);

async function importFiles(files) {
  if (!files.length) return;
  // Nascondi drop zone e mostra overlay globale
  overlay.style.display='none';
  showGlobalLoading(t('import.importing', {count: files.length}), t('import.pleaseWait'));
  const fd = new FormData();
  Array.from(files).forEach(f=>fd.append('gpx',f));
  try {
    const resp = await fetch(`${API}/api/import`,{method:'POST',body:fd, signal:getOverlaySignal()});
    _pendingImportResults = await resp.json();
    const errors = _pendingImportResults.filter(r=>r.error);
    if (errors.length) {
      alert(errors.map(r=>`❌ ${r.filename}: ${r.error}`).join('\n'));
    }
  } catch(e) {
    if (e.name === 'AbortError') { _pendingImportResults=[]; }
    else { alert(t('error.generic', {message: e.message})); _pendingImportResults=[]; }
  }
  hideGlobalLoading();
  const importedId = (_pendingImportResults.find(r => r.activity_id && !r.error) || {}).activity_id;
  await Promise.all([loadStatus(), loadActivities()]);
  if (importedId) selectActivity(importedId);
  _pendingImportResults = [];
}

document.getElementById('act-list').addEventListener('click', async e => {
  // .tree-seg → selectSegment
  const treeSeg = e.target.closest('.tree-seg');
  if (treeSeg) {
    e.stopPropagation();
    const effDel = e.target.closest('.effort-delete');
    if (effDel) {
      const effortId = effDel.dataset.effortId;
      if (!confirm(t('confirm.deleteEffort'))) return;
      try {
        await api(`/api/efforts/${effortId}`, {method:'DELETE'});
        await Promise.all([loadStatus(), loadActivities()]);
        if (currentActivityId) {
          const actId = currentActivityId;
          currentActivityId = null;
          activeEffortId = null;
          await selectActivity(actId);
        }
      } catch (err) {
        alert(t('error.deletion', {message: err.message}));
      }
      return;
    }
    // Passa sia segment_id che effort_id
    selectSegment(+treeSeg.dataset.segId, +treeSeg.dataset.effortId);
    return;
  }
  // .act-expand → toggle tree
  const expand = e.target.closest('.act-expand');
  if (expand) {
    e.stopPropagation();
    const id = +expand.dataset.expand;
    const tree = document.getElementById('tree-' + id);
    const isOpen = tree && tree.classList.contains('open');
    if (tree) tree.classList.toggle('open', !isOpen);
    expand.classList.toggle('open', !isOpen);
    return;
  }
  // .fetch-btn → fetch effort strava
  const fetchBtn = e.target.closest('.fetch-btn');
  if (fetchBtn) {
    e.stopPropagation();
    if (fetchBtn.disabled) return;
    const id = +fetchBtn.dataset.id;
    const input = document.querySelector(`.strava-id-input[data-id="${id}"]`);
    const statusEl = document.getElementById('fs-' + id);
    const stravaId = input ? input.value.trim() : '';
    if (!stravaId) {
      if (statusEl) statusEl.innerHTML = `<span style="color:var(--orange)">${t('fetch.enterStravaId')}</span>`;
      return;
    }
    fetchBtn.disabled = true;
    const act0 = allActivities.find(a => a.activity_id===id);
    const actName = act0 ? (act0.activity_name || act0.filename) : `#${id}`;
    showGlobalLoading(t('fetch.fetching'), actName);
    try {
      const res = await fetch(`${API}/api/activities/${id}/strava-efforts`, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({strava_activity_id: +stravaId}),
        signal: getOverlaySignal()
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      if (statusEl) statusEl.innerHTML = `<span style="color:var(--green)">${t('fetch.imported', {count: data.saved})}</span>`;
      fetchBtn.textContent = '⟳ Strava'; fetchBtn.style.background = 'var(--green)';
      const act = allActivities.find(a => a.activity_id===id);
      if (act) {
        act.strava_effort_source  = 'strava_api';
        act.strava_activity_id    = +stravaId;
        act.strava_effort_count   = (act.strava_effort_count || 0) + data.saved;
        act.effort_count          = (act.effort_count || 0) + data.saved;
      }
      await loadActivities();
      if (currentActivityId === id) {
        const efforts = await api(`/api/activities/${id}/efforts`);
        currentEfforts = efforts; populateTree(id, efforts);
        clearMapLayers(); showEffortsOnMap(efforts);
      }
      await loadStatus();
    } catch(err) {
      if (err.name !== 'AbortError' && statusEl) statusEl.innerHTML = `<span style="color:var(--orange)">${t('fetch.error', {error: err.message})}</span>`;
    }
    hideGlobalLoading();
    fetchBtn.disabled = false;
    return;
  }
  // .act-item → selectActivity (solo se non note o input)
  const actItem = e.target.closest('.act-item');
  if (actItem) {
    if (e.target.classList.contains('act-notes-area')) return;
    if (e.target.classList.contains('strava-id-input')) return;
    selectActivity(+actItem.dataset.id);
  }
});

  updateSyncCount();
  document.getElementById('sync-open-strava').style.display='inline-block';
  document.getElementById('sync-open-strava').onclick=()=>window.open('https://www.strava.com/athlete/training','_blank');
}

document.getElementById('sync-import-selected').addEventListener('click', async () => {
  const checked = [...document.querySelectorAll('.strava-act-row:not(.imported) input[type=checkbox]:checked')];
  if (!checked.length) return;
  const btn = document.getElementById('sync-import-selected');
  btn.disabled = true;
  btn.textContent = t('btn.importing');
  let done=0, errors=0;
  for (const cb of checked) {
    const row = cb.closest('.strava-act-row');
    const stravaId = +cb.dataset.id;
    const act = stravaActivities.find(a=>a.strava_id===stravaId);
    const sport = act ? act.sport_type.toLowerCase() : 'cycling';
    const actType = sport.includes('run') ? 'running' : 'cycling';
    try {
      const res = await fetch(`${API}/api/strava/import-activity`, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({strava_activity_id: stravaId, activity_type: actType})
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      row.classList.add('imported');
      cb.checked=true; cb.disabled=true;
      const gpxInfo = data.gpx_stats
        ? ` · ${(data.gpx_stats.total_distance_m/1000).toFixed(1)}km`
        : (data.gpx_skipped ? ` · ${t('sync.noGpx')}` : '');
      row.querySelector('.strava-act-info').insertAdjacentHTML('beforeend',
        `<div style="font-size:10px;color:var(--green);margin-top:2px">✓ ${data.strava_efforts} effort${gpxInfo}</div>`);
      if (act) act.imported=true;
      done++;
    } catch(e) {
      row.querySelector('.strava-act-info').insertAdjacentHTML('beforeend',
        `<div style="font-size:10px;color:var(--orange);margin-top:2px">⚠ ${e.message}</div>`);
      errors++;
    }
    updateSyncCount();
  }
  btn.disabled=false;
  btn.textContent=t('btn.importFromStrava');
  await Promise.all([loadStatus(), loadActivities()]);
});

function updateSyncCount(){
  const checked=document.querySelectorAll('.strava-act-row:not(.imported) input[type=checkbox]:checked').length;
  document.getElementById('sync-import-selected').style.display = checked>0 ? 'inline-block' : 'none';
  const imported=stravaActivities.filter(a=>a.imported).length;
  document.getElementById('sync-count').innerHTML=
    checked>0?t('sync.toDownload',{count:checked,imported:imported,total:stravaActivities.length})
    :t('sync.alreadyImported',{imported:imported,total:stravaActivities.length});
}

// ── UTILS ─────────────────────────────────────────────────────────
function formatTime(s){
  if(!s&&s!==0)return'N/A';
  s=Math.round(s);const m=Math.floor(s/60),sec=s%60,h=Math.floor(m/60),min=m%60;
  if(h>0)return`${h}h ${String(min).padStart(2,'0')}m ${String(sec).padStart(2,'0')}s`;
  return`${min}m ${String(sec).padStart(2,'0')}s`;
}
function decodePolyline(str){
  let i=0,lat=0,lng=0,r=[];
  while(i<str.length){
    let b,s=0,res=0;
    do{b=str.charCodeAt(i++)-63;res|=(b&0x1f)<<s;s+=5}while(b>=0x20);
    lat+=(res&1)?~(res>>1):(res>>1);s=res=0;
    do{b=str.charCodeAt(i++)-63;res|=(b&0x1f)<<s;s+=5}while(b>=0x20);
    lng+=(res&1)?~(res>>1):(res>>1);
    r.push([lat/1e5,lng/1e5]);
  }
  return r;
}


// ── INIT ──────────────────────────────────────────────────────────
(async()=>{
  applyI18n();
  initLanguageSelector();
  await Promise.all([loadStatus(), loadActivities(), loadSettings(), loadStravaAuthStatus()]);
})();
